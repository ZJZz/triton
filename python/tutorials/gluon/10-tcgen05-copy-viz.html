<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>tcgen05_copy 可视化 — Matmul + Accumulate (D = A·B + C)</title>
<style>
  :root{
    --bg:#eef1f6; --panel:#ffffff; --panel2:#f1f5fa; --line:#d4dce6;
    --txt:#1c2733; --muted:#5b6b7d; --accent:#5a8a00;
    /* hardware module palette (与 07/08 viz 一致) */
    --gmem:#475569; --tma:#0891b2; --smem:#16a34a; --tmem:#7c3aed;
    --core:#db2777; --store:#ea580c; --reg:#2563eb; --sync:#dc2626;
    /* data-stream colours */
    --A:#2563eb; --B:#0d9488; --Cin:#d97706; --ACC:#7c3aed; --D:#ea580c;
    --fence:#ca8a04; --ready:#dc2626; --empty:#64748b;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--txt);
    font-family:"Segoe UI",system-ui,-apple-system,"Microsoft YaHei",sans-serif;font-size:13px;line-height:1.5}
  body{display:flex;flex-direction:column;height:100vh;overflow:hidden}

  header{padding:10px 18px;border-bottom:1px solid var(--line);
    background:linear-gradient(180deg,#ffffff,#e9eef5);flex:none}
  header h1{margin:0;font-size:17px;letter-spacing:.3px}
  header h1 .g{color:var(--accent)}
  .htop{display:flex;align-items:center;gap:18px;flex-wrap:wrap}
  .badge{font-size:11px;font-weight:600;color:#fff;background:var(--tmem);
    padding:3px 11px;border-radius:20px;white-space:nowrap}
  .stagedesc{color:var(--muted);font-size:12px;flex:1;min-width:240px}
  .stagedesc b{color:var(--txt)}

  /* main: 左区(视角1+2+3) ｜ 视角4 代码独立全高右栏 */
  main{flex:1;display:flex;min-height:0;gap:8px;padding:8px}
  .leftRegion{flex:1;display:flex;flex-direction:column;gap:8px;min-width:0;min-height:0}
  .topRow{flex:1;display:flex;gap:8px;min-height:0}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:11px;
    display:flex;flex-direction:column;min-height:0;overflow:hidden}
  .colCode{flex:0 0 32%;min-width:350px}       /* 视角4 代码: 全高右栏 */
  .panel.combo{flex:1;min-width:0}
  .comboBody{flex:1;display:flex;min-height:0;min-width:0}
  .subData{flex:0 0 31%;min-width:0;overflow:hidden;border-right:1px dashed var(--line)}
  .subMicro{flex:1;min-width:0;overflow:hidden}
  .subData svg,.subMicro svg{width:100%;height:100%;display:block}
  .phead{padding:7px 12px;font-size:12.5px;font-weight:700;border-bottom:1px solid var(--line);
    background:var(--panel2);display:flex;align-items:center;gap:8px;flex:none}
  .phead .tag{font-size:10.5px;font-weight:600;color:#fff;background:var(--accent);
    padding:1px 7px;border-radius:20px}
  .phead .hint{margin-left:auto;color:var(--muted);font-weight:400;font-size:11px}
  .pbody{flex:1;min-height:0;overflow:auto;position:relative}
  svg{display:block;width:100%;height:auto}

  /* code panel */
  .explain{padding:8px 12px;background:#eef6ff;border-bottom:1px solid var(--line);
    font-size:12.5px;line-height:1.5;flex:none;min-height:52px;max-height:140px;overflow:auto}
  .explain b{color:#11305c}
  .explain code{font-family:Consolas,monospace;background:#fff3cd;color:#9a3412;
    padding:0 5px;border-radius:3px;font-size:11px;font-weight:600;border:1px solid #f1d48a}
  .extrig{font-size:11.5px;color:#33414f;margin:2px 0 4px 4px;padding:2px 8px;
    border-left:3px solid var(--fence);background:#fffaf0;border-radius:0 5px 5px 0}
  .extrig b{color:#11305c}
  .exsingle{display:flex;gap:9px;align-items:flex-start}
  .exsingle .exdot{width:11px;height:11px;border-radius:50%;margin-top:3px;flex:none;
    box-shadow:0 0 0 3px rgba(0,0,0,.04)}
  .exrows{display:flex;flex-direction:column;gap:4px}
  .exhead{font-weight:700;color:#11305c;font-size:12px;margin-bottom:1px}
  .exrow{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .exrow .pp{color:#fff;font-weight:700;border-radius:5px;padding:1px 8px;font-size:11px;white-space:nowrap}
  .exrow .arw{font-weight:700;white-space:nowrap;font-size:11.5px}
  .exrow .evt{font-weight:700;white-space:nowrap;font-size:11.5px;font-family:Consolas,monospace}
  .exrow .extxt{color:#33414f;font-size:11.5px}
  .codewrap{padding:8px 8px}
  .cblock{margin-bottom:9px;border:1px solid #e3ebf3;border-radius:8px;overflow:hidden;background:#fff}
  .cbhead{font-size:12px;font-weight:700;padding:5px 10px;display:flex;gap:7px;align-items:center;
    flex-wrap:wrap;background:#f4f8fc;border-bottom:1px solid #e3ebf3}
  .cbhead .sw{width:11px;height:11px;border-radius:3px;flex:none}
  .cbname{font-weight:700;color:#1c2733}
  .cbpart{color:#90a0b0;font-weight:400;font-size:10.5px;font-family:Consolas,monospace}
  .cbnow{margin-left:auto;font-size:10.5px;font-weight:600;border:1px solid #cbd5e1;border-radius:20px;
    padding:1px 9px;background:#fff;font-family:Consolas,monospace;max-width:100%;min-width:0;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  pre{margin:0;font-family:"Cascadia Code",Consolas,Menlo,monospace;font-size:12.5px;line-height:1.6;padding:4px 0}
  .cl{padding:1px 12px 1px 14px;white-space:pre;border-left:3px solid transparent;color:#33414f}
  .cl.on{background:#fff3cd;font-weight:600;color:#1c2733}
  .cm{color:#8a98a8}.kw{color:#cf222e}.fn{color:#0550ae}.st{color:#0a6e3b}.nm{color:#953800}

  /* timeline (视角3) */
  .timeline{flex:none;height:340px;border:1px solid var(--line);border-radius:11px;
    background:var(--panel);display:flex;flex-direction:column;overflow:hidden;min-width:0}
  .tlhead{padding:6px 14px;display:flex;align-items:center;gap:12px;flex:none;
    border-bottom:1px solid var(--line);background:var(--panel2)}
  .tlhead .title{font-weight:700;font-size:12.5px}
  .btn{border:1px solid var(--line);background:#fff;border-radius:7px;padding:4px 12px;
    cursor:pointer;font-size:12px;font-weight:600;color:var(--txt)}
  .btn:hover{border-color:var(--accent)}
  .btn.play{background:var(--accent);color:#fff;border-color:var(--accent)}
  .tlhead .tk{margin-left:auto;color:var(--muted);font-size:11.5px}
  .tlhead .tk b{color:var(--txt);font-variant-numeric:tabular-nums}
  .tlbody{flex:1;min-height:0;overflow:hidden;cursor:ew-resize}
  #tlsvg{width:100%;height:100%}

  .legend{display:flex;gap:7px 9px;flex-wrap:wrap;font-size:10px;color:var(--muted);
    padding:3px 12px;border-top:1px solid var(--line);flex:none;align-items:center;line-height:1.35}
  .legend span{display:inline-flex;gap:4px;align-items:center}
  .legend i{width:10px;height:10px;border-radius:2px;display:inline-block}

  .barLbl{font-size:10px;fill:#fff;font-weight:600;pointer-events:none}
  .nodeBox{stroke-width:1.6;transition:.18s;rx:9}
  .nodeLbl{font-size:12px;font-weight:700}
  .nodeSub{font-size:9.5px;fill:var(--muted)}
  .flowArrow{fill:none;stroke:#c4cedb;stroke-width:2}
  .cell{stroke:#fff;stroke-width:1.5}
  .gridLbl{font-size:10.5px;fill:var(--muted);font-weight:600}
  .small{font-size:9.5px;fill:var(--muted)}
</style>
</head>
<body>
<header>
  <div class="htop">
    <h1>tcgen05_copy <span class="g">·</span> Matmul + Accumulate 可视化</h1>
    <span class="badge">Blackwell · D = A·B + C</span>
    <div class="stagedesc" id="stagedesc"></div>
  </div>
</header>

<main>
  <div class="leftRegion">
    <div class="topRow">
      <div class="panel combo">
        <div class="phead"><span class="tag">视角 1·2</span>数据切分 ➜ 微架构数据流
          <span class="hint">左: A/B/C 分块与累加 ｜ 右: 数据在各硬件模块间流动 · 虚线领地框=各分区(warp组) · barrier 满足=🟢/失效=灰</span></div>
        <div class="comboBody">
          <div class="pbody subData" id="dataPanel"></div>
          <div class="pbody subMicro" id="microPanel"></div>
        </div>
      </div>
    </div>
    <div class="timeline">
      <div class="tlhead">
        <span class="title">视角 3 · 时间线 Pipeline</span>
        <button class="btn play" id="playBtn">▶ 播放</button>
        <button class="btn" id="stepB">◀</button>
        <button class="btn" id="stepF">▶</button>
        <button class="btn" id="resetB">⟲</button>
        <span class="tk">tick <b id="tkval">0.0</b> / <span id="tkmax"></span> ·
          拖动时间轴或播放头逐步观察 · 虚线箭头 = mbarrier 跨分区同步</span>
      </div>
      <div class="tlbody" id="tlbody"></div>
      <div class="legend" id="legend"></div>
    </div>
  </div>
  <div class="panel code colCode">
    <div class="phead"><span class="tag">视角 4</span>代码 &amp; 讲解
      <span class="hint">每个分区一框 · 标题右侧胶囊=该分区此刻在做什么 · 高亮行=正在执行的指令</span></div>
    <div class="explain" id="explain"></div>
    <div class="pbody"><div class="codewrap" id="codePanel"></div></div>
  </div>
</main>

<script>
/* ============================================================================
   颜色常量
   ========================================================================== */
const COL = {
  A:'#2563eb', B:'#0d9488', Cin:'#d97706', ACC:'#7c3aed', D:'#ea580c',
  fence:'#ca8a04',
  ready:'#22c55e', empty:'#94a3b8',   // ready=绿(数据就绪, 放行下游) / empty=灰(buffer 腾空, 放行上游)
  gmem:'#475569', tma:'#0891b2', smem:'#16a34a', tmem:'#7c3aed', core:'#db2777',
};
const lighten = (hex,a)=>{
  if(typeof hex!=='string'||hex[0]!=='#') return '#f1f5fa';
  const n=parseInt(hex.slice(1),16); const r=n>>16,g=(n>>8)&255,b=n&255;
  return `rgba(${r},${g},${b},${a})`;
};

/* ============================================================================
   Stage — Persistent matmul-accumulate, warp-specialized, tcgen05 (Blackwell)
   分区: load / mma / epilogue.   2 个输出 tile, 每 tile 沿 K 做 3 步.
   新要点: TMA 把 C 载入 SMEM → tcgen05_copy 异步拷入 TMEM 累加器 → tcgen05_mma
   以 use_acc=True 在 C 之上累加; 累加器双缓冲, C 单缓冲.
   ========================================================================== */
function buildKernel(){
  const ops=[]; const push=o=>ops.push(o);
  const tiles=2, K=3, nbuf=3;

  /* ---- LOAD partition (顺序发载: C, 然后 A/B×K; 缓冲轮转) ---- */
  let lt=0, lcount=0;
  for(let t=0;t<tiles;t++){
    push({part:'load',start:lt,dur:0.01,c:COL.empty,lines:['L2'],
          waitsOn:t>=1?'c_empty#0':null,label:`wait c_empty`,mark:1});
    push({part:'load',start:lt,dur:2,c:COL.Cin,lines:['L3','L4'],
          flow:['GMEM_IN','TMA_LOAD','SMEM_C'],signal:'c_ready#0',
          label:`TMA load C · t${t}`,stream:'C',tile:t,buf:0,kind:'loadC'});
    lt+=2;
    for(let k=0;k<K;k++){
      const idx=lcount%nbuf;
      push({part:'load',start:lt,dur:0.01,c:COL.empty,lines:['L6'],
            waitsOn:lcount>=nbuf?`load_empty#${idx}`:null,label:`wait load_empty[${idx}]`,mark:1});
      push({part:'load',start:lt,dur:1.5,c:COL.A,lines:['L8'],
            flow:['GMEM_IN','TMA_LOAD','SMEM_AB'],signal:`load_ready#${idx}`,
            label:`TMA load A[m,k${k}] · t${t}`,stream:'A',tile:t,k,buf:idx,kind:'load'});
      push({part:'load',start:lt,dur:1.5,c:COL.B,lines:['L9'],
            flow:['GMEM_IN','TMA_LOAD','SMEM_AB'],
            label:`TMA load B[k${k},n] · t${t}`,stream:'B',tile:t,k,buf:idx,kind:'load'});
      lt+=1.5; lcount++;
    }
  }

  /* ---- MMA partition (tcgen05_copy C→acc, 然后沿 K 做 tcgen05_mma 累加) ---- */
  const cEnd=[2,8.5], abEnd=[[3.5,5,6.5],[10,11.5,13]];   // 与 LOAD 完成时刻对齐
  let mc=0;
  for(let t=0;t<tiles;t++){
    const acc=t%2, copyStart=cEnd[t];
    push({part:'mma',start:copyStart,dur:0.01,c:COL.ready,lines:['M2'],
          waitsOn:'c_ready#0',label:`wait c_ready`,mark:1});
    push({part:'mma',start:copyStart,dur:0.01,c:COL.empty,lines:['M3'],
          waitsOn:t>=2?`acc_empty#${acc}`:null,label:`wait acc_empty[${acc}]`,mark:1});
    push({part:'mma',start:copyStart,dur:1,c:COL.Cin,lines:['M4'],
          flow:['SMEM_C','TENSOR_CORE','TMEM'],
          label:`tcgen05_copy C → acc${acc}`,tile:t,acc,buf:0,kind:'copy'});
    push({part:'mma',start:copyStart+1,dur:0.01,c:COL.empty,lines:['M5'],
          signal:'c_empty#0',label:`commit c_empty`,mark:1,commit:1});
    let mmaEnd=copyStart+1;
    for(let k=0;k<K;k++){
      const idx=mc%nbuf, st=Math.max(mmaEnd, abEnd[t][k]);
      push({part:'mma',start:st,dur:0.01,c:COL.ready,lines:['M7'],
            waitsOn:`load_ready#${idx}`,label:`wait load_ready[${idx}]`,mark:1});
      push({part:'mma',start:st,dur:1,c:COL.ACC,lines:['M8'],
            flow:['SMEM_AB','TENSOR_CORE','TMEM'],
            label:`tcgen05_mma k${k} → acc${acc}`,tile:t,k,acc,buf:idx,kind:'mma'});
      push({part:'mma',start:st+1,dur:0.01,c:COL.empty,lines:['M9'],
            signal:`load_empty#${idx}`,label:`commit load_empty[${idx}]`,mark:1,commit:1});
      mmaEnd=st+1; mc++;
    }
    push({part:'mma',start:mmaEnd,dur:0.01,c:COL.ready,lines:['M10'],
          signal:`acc_ready#${acc}`,label:`commit acc_ready[${acc}]`,mark:1,commit:1});
  }

  /* ---- EPILOGUE partition (读 TMEM → convert_layout → gl.store 直写 global) ---- */
  const accReadyEnd=[7.5,14];
  for(let t=0;t<tiles;t++){
    const acc=t%2, es=accReadyEnd[t];
    push({part:'epilogue',start:es,dur:0.01,c:COL.ready,lines:['E2'],
          waitsOn:`acc_ready#${acc}`,label:`wait acc_ready[${acc}]`,mark:1});
    push({part:'epilogue',start:es,dur:1,c:COL.ACC,lines:['E3'],
          flow:['TMEM','COMPUTE'],label:`load acc from TMEM · t${t}`,tile:t,acc,kind:'tmem_load'});
    push({part:'epilogue',start:es+1,dur:0.01,c:COL.empty,lines:['E4'],
          signal:`acc_empty#${acc}`,label:`arrive acc_empty[${acc}]`,mark:1});
    push({part:'epilogue',start:es+1,dur:1,c:COL.D,lines:['E5'],
          flow:['COMPUTE'],label:`convert_layout · t${t}`,tile:t,kind:'convert'});
    push({part:'epilogue',start:es+2,dur:1.5,c:COL.D,lines:['E6'],
          flow:['COMPUTE','GMEM_OUT'],label:`gl.store D · t${t}`,tile:t,kind:'store'});
  }

  return {
    ops, maxTick:18, tiles, K,
    lanes:[
      {id:'load',    name:'Load 分区',     sub:'1 warp · TMA(C/A/B)'},
      {id:'mma',     name:'MMA 分区',      sub:'tcgen05 copy + mma'},
      {id:'epilogue',name:'Epilogue 分区', sub:'默认 · convert+store'},
    ],
    modules:[
      {id:'GMEM_IN',  x:30, y:64, w:130,h:84, c:COL.gmem, t:['Global Mem','A · B · C (HBM)']},
      {id:'TMA_LOAD', x:250,y:74, w:110,h:66, c:COL.tma,  t:['TMA Load','async']},
      {id:'SMEM_AB',  x:445,y:40, w:162,h:88, c:COL.smem, t:['SMEM · a/b_bufs'], nbuf:3},
      {id:'SMEM_C',   x:445,y:168,w:162,h:66, c:COL.smem, t:['SMEM · c_buf'], nbuf:1, bufpre:'c'},
      {id:'TENSOR_CORE',x:720,y:156,w:176,h:108,c:COL.core,t:['Tensor Core','tcgen05 copy+mma'], showAct:1},
      {id:'TMEM',     x:720,y:392,w:176,h:108, c:COL.tmem, t:['TMEM','acc ×2 (双缓冲)'], nbuf:2, bufpre:'acc'},
      {id:'COMPUTE',  x:445,y:392,w:190,h:108, c:COL.core, t:['Epilogue warps','TMEM→convert→reg'], showAct:1},
      {id:'GMEM_OUT', x:30, y:398,w:130,h:96, c:COL.gmem, t:['Global Mem','D = A·B + C']},
      // mbarrier 各自成模块 (虚线框, h=32 容纳框内三行文字), 紧贴"要等它"的分区模块;
      // 与各分区领地框(其标签向上凸出 15px)保持纵向间隙, 避免框间 / 框内重叠
      {id:'B_load_ready', x:710,y:92, w:180,h:32, bar:1, type:'ready', t:['load_ready']},  // mma 等 (TENSOR_CORE 上方)
      {id:'B_load_empty', x:244,y:170,w:130,h:32, bar:1, type:'empty', t:['load_empty']},  // load 等 (TMA_LOAD 下方)
      {id:'B_c_ready',    x:445,y:246,w:162,h:32, bar:1, type:'ready', t:['c_ready']},     // mma 等 (SMEM_C 下方)
      {id:'B_c_empty',    x:244,y:210,w:130,h:32, bar:1, type:'empty', t:['c_empty']},     // load 等 (TMA_LOAD 下方)
      {id:'B_acc_ready',  x:445,y:348,w:190,h:32, bar:1, type:'ready', t:['acc_ready']},   // epilogue 等 (COMPUTE 上方)
      {id:'B_acc_empty',  x:620,y:300,w:180,h:32, bar:1, type:'empty', t:['acc_empty']},   // mma 等 (TENSOR_CORE↔TMEM 之间)
    ],
    edges:[['GMEM_IN','TMA_LOAD'],['TMA_LOAD','SMEM_AB'],['TMA_LOAD','SMEM_C'],
           ['SMEM_AB','TENSOR_CORE'],['SMEM_C','TENSOR_CORE'],
           ['TENSOR_CORE','TMEM'],['TMEM','COMPUTE'],['COMPUTE','GMEM_OUT']],
    barMap:{
      load_ready:{mods:['SMEM_AB','TENSOR_CORE'], type:'ready', cons:'mma',      watch:'TENSOR_CORE', mod:'B_load_ready', txt:'A/B 分片已载入 SMEM'},
      load_empty:{mods:['TENSOR_CORE','SMEM_AB'], type:'empty', cons:'load',     watch:'TMA_LOAD',    mod:'B_load_empty', txt:'A/B buffer 已被 MMA 读走、腾空'},
      c_ready:   {mods:['SMEM_C','TENSOR_CORE'],  type:'ready', cons:'mma',      watch:'TENSOR_CORE', mod:'B_c_ready',    txt:'C 分片已载入 SMEM'},
      c_empty:   {mods:['TENSOR_CORE','SMEM_C'],  type:'empty', cons:'load',     watch:'TMA_LOAD',    mod:'B_c_empty',    txt:'C buffer 已被 copy 读走、腾空'},
      acc_ready: {mods:['TMEM','COMPUTE'],        type:'ready', cons:'epilogue', watch:'COMPUTE',     mod:'B_acc_ready',  txt:'累加器已算完整段 K (含 +C)'},
      acc_empty: {mods:['COMPUTE','TMEM'],        type:'empty', cons:'mma',      watch:'TENSOR_CORE', mod:'B_acc_empty',  txt:'累加器已被 epilogue 读走、腾空'},
    },
    vb:[0,0,920,580],
    partMods:{
      load:    ['GMEM_IN','TMA_LOAD'],
      mma:     ['TENSOR_CORE'],
      epilogue:['COMPUTE','GMEM_OUT'],
    },
    code:{
      load:[
        ['L1','for idx in range(num_tiles):','kw'],
        ['L2','  mbarrier.wait(c_empty_bar, c_phase)','fn'],
        ['L3','  mbarrier.expect(c_ready_bar, c.nbytes)','fn'],
        ['L4','  tma.async_load(c_desc,[off_m,off_n], c_ready, c_buf)','fn'],
        ['L5','  for k in range(0, K, BLOCK_K):','kw'],
        ['L6','    mbarrier.wait(load_empty[i], phase)','fn'],
        ['L7','    mbarrier.expect(bar, a+b nbytes)','fn'],
        ['L8','    tma.async_load(a_desc,[off_m,k], bar, a)','fn'],
        ['L9','    tma.async_load(b_desc,[k,off_n], bar, b)','fn'],
      ],
      mma:[
        ['M1','for _ in range(num_tiles):','kw'],
        ['M2','  mbarrier.wait(c_ready_bar, c_phase)','fn'],
        ['M3','  mbarrier.wait(acc_empty[i], phase)','fn'],
        ['M4','  tcgen05_copy(c_buf, acc_buf)','fn'],
        ['M5','  tcgen05_commit(c_empty_bar)','fn'],
        ['M6','  for k in range(0, K, BLOCK_K):','kw'],
        ['M7','    mbarrier.wait(load_ready[i], phase)','fn'],
        ['M8','    tcgen05_mma(a, b, acc, use_acc=True)','fn'],
        ['M9','    tcgen05_commit(load_empty[i])','fn'],
        ['M10','  tcgen05_commit(acc_ready[i])','fn'],
      ],
      epilogue:[
        ['E1','for idx in range(num_tiles):','kw'],
        ['E2','  mbarrier.wait(acc_ready[i], phase)','fn'],
        ['E3','  acc = acc_bufs[i].load()','st'],
        ['E4','  mbarrier.arrive(acc_empty[i])','fn'],
        ['E5','  acc = convert_layout(acc, coalesced)','fn'],
        ['E6','  gl.store(d_ptr + ..., acc)','fn'],
      ],
    },
    desc:`<b>D = A·B + C：</b>同样的 <b>Load / MMA / Epilogue</b> 三分区。LOAD 用 TMA 把 <b>C</b> 载入 SMEM；`+
         `MMA 先 <b>tcgen05_copy</b> 把 C 异步拷进 <b>TMEM 累加器</b>，再沿 K 用 <b>tcgen05_mma(use_acc=True)</b> 在其上累加——`+
         `copy 与首个 MMA <b>隐式流水</b>，无需等待。累加器<b>双缓冲</b>使 MMA(tile i+1) 与 Epilogue(tile i) 重叠；`+
         `Epilogue 用 <b>gl.store</b> 直写 global 省下 SMEM 与 TMA store 竞争。`,
  };
}

/* ============================================================================
   状态 + 工具
   ========================================================================== */
const STAGES={1:buildKernel()};
let stage=1, tick=0, playing=false, raf=null, hoverOp=null;
const S=()=>STAGES[stage];

const isActive=(o,t)=> o.mark
  ? Math.abs(t-o.start)<0.25
  : (t>=o.start-1e-6 && t<o.start+o.dur);
const isDone=(o,t)=> t>=o.start+o.dur-1e-6;
const activeOps=t=>S().ops.filter(o=>isActive(o,t));
const opProgress=(o,t)=> (!o||!(o.dur>0))?0:Math.max(0,Math.min(1,(t-o.start)/o.dur));
function progBar(x,y,w,h,p,color){
  const pc=Math.max(0,Math.min(1,p));
  return `<rect x="${x}" y="${y}" width="${w}" height="${h}" rx="${h/2}" fill="#d7e0ea"/>`+
    (pc>0?`<rect x="${x}" y="${y}" width="${(w*pc).toFixed(1)}" height="${h}" rx="${h/2}" fill="${color}"/>`:'');
}
function barrierActive(name,t){
  const pre = name.startsWith('acc')?'acc':(name.startsWith('c_')?'c':'buf');
  for(const w of S().ops){
    if(!w.waitsOn || w.waitsOn.split('#')[0]!==name) continue;
    const prod=findProducer(w);
    const startT = prod ? prod.start+prod.dur : 0;
    const follow=S().ops.find(o=>!o.mark&&o.flow&&o.part===w.part&&Math.abs(o.start-w.start)<0.3);
    const end=follow?follow.start+follow.dur:w.start+0.5;
    if(t>=startT-1e-6 && t<end-1e-6){
      const idx=w.waitsOn.split('#')[1];
      return {green:true, block: follow?(dataTag(follow)||{}).block:null, loc: idx!==undefined?pre+idx:null};
    }
  }
  return {green:false, block:null, loc:null};
}
function emptyState(name,t){
  const d=S(), info=(d.barMap||{})[name]; if(!info) return {green:false,locs:[]};
  const pre = name.startsWith('acc')?'acc':(name.startsWith('c_')?'c':'buf');
  const bufMod=info.mods[1];
  const modDef=(d.modules||[]).find(m=>m.id===bufMod)||{};
  const idxOf=o=>pre==='acc'?o.acc:o.buf;
  const fills=d.ops.filter(o=>!o.mark&&o.flow&&o.flow[o.flow.length-1]===bufMod&&idxOf(o)!==undefined);
  const nbuf=modDef.nbuf || (fills.reduce((m,o)=>Math.max(m,idxOf(o)),-1)+1);
  const frees=d.ops.filter(o=>o.mark&&o.signal&&o.signal.split('#')[0]===name);
  const locs=[];
  for(let b=0;b<nbuf;b++){
    const fb=fills.filter(o=>idxOf(o)===b).map(o=>o.start).sort((x,y)=>x-y);
    const frb=frees.filter(o=>+o.signal.split('#')[1]===b).map(o=>o.start).sort((x,y)=>x-y);
    let empty=false;
    if(t<1e-6) empty=true;
    else if(fb.length===0 || t<fb[0]-1e-6) empty=true;
    else { let lastFree=-Infinity; for(const ft of frb) if(ft<=t+1e-6) lastFree=ft;
      if(lastFree>-Infinity){ const nextFill=fb.find(s=>s>lastFree+1e-6);
        if(nextFill===undefined || t<nextFill-1e-6) empty=true; } }
    if(empty) locs.push(pre+b);
  }
  return {green:locs.length>0, locs};
}

function findProducer(op){
  if(!op.waitsOn) return null;
  let best=null, bend=-1;
  for(const o of S().ops){
    if(o.signal===op.waitsOn){
      const end=o.start+o.dur;
      if(end<=op.start+0.05 && end>bend){best=o;bend=end;}
    }
  }
  return best;
}

/* ============================================================================
   视角 2 — 微架构数据流
   ========================================================================== */
function borderPoint(b,tx,ty){
  const cx=b.x+b.w/2, cy=b.y+b.h/2, dx=tx-cx, dy=ty-cy;
  if(!dx&&!dy)return{x:cx,y:cy};
  const sx=dx?(b.w/2)/Math.abs(dx):1e9, sy=dy?(b.h/2)/Math.abs(dy):1e9;
  const s=Math.min(sx,sy);
  return{x:cx+dx*s,y:cy+dy*s};
}
function renderMicro(t, extra){
  const d=S(); const acts=activeOps(t).concat(extra||[]);
  const onMods=new Set(); const onEdges=new Map();
  const barMap=d.barMap||{}; const syncLinks=[];
  const edgeTags=new Map();
  acts.forEach(o=>{
    if(o.flow){
      o.flow.forEach(m=>onMods.add(m));
      for(let i=0;i<o.flow.length-1;i++) onEdges.set(o.flow[i]+'|'+o.flow[i+1],o.c);
      if(o.flow.length>=2){
        const key=o.flow[o.flow.length-2]+'|'+o.flow[o.flow.length-1];
        const tg=dataTag(o);
        if(tg){ if(!edgeTags.has(key)) edgeTags.set(key,new Map());
          const tm=edgeTags.get(key); const tk=tg.block+'¦'+tg.loc;
          if(!tm.has(tk)) tm.set(tk,{block:tg.block,loc:tg.loc,ps:new Set()});
          tm.get(tk).ps.add(tg.p); }
      }
    }
    if(o.mark){
      const tag=o.signal||o.waitsOn||'';
      const info=barMap[tag.split('#')[0]];
      if(info){
        if(o.signal)       syncLinks.push({from:info.mods[0],to:info.mod,type:info.type});
        else if(o.waitsOn) syncLinks.push({from:info.mod,to:info.mods[1],type:info.type});
      }
    }
  });
  const M={}; d.modules.forEach(m=>M[m.id]=m);
  let svg=`<svg viewBox="${d.vb.join(' ')}">`;
  let labelSvg='';
  svg+=`<defs><marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="3"
        orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#9fb0c0"/></marker>
        <marker id="ahx" markerWidth="10" markerHeight="10" refX="7" refY="3"
        orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#1c2733"/></marker>
        <marker id="sync_ready" markerWidth="8" markerHeight="8" refX="6" refY="3"
        orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="${COL.ready}"/></marker>
        <marker id="sync_empty" markerWidth="8" markerHeight="8" refX="6" refY="3"
        orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="${COL.empty}"/></marker></defs>`;
  const partMods=d.partMods||{};
  Object.keys(partMods).forEach(pid=>{
    const mods=partMods[pid].map(id=>M[id]).filter(Boolean); if(!mods.length) return;
    const pad=10;
    const x1=Math.min(...mods.map(m=>m.x))-pad, y1=Math.min(...mods.map(m=>m.y))-pad;
    const x2=Math.max(...mods.map(m=>m.x+m.w))+pad, y2=Math.max(...mods.map(m=>m.y+m.h))+pad;
    const pc=pColor(pid), lname=pLane(pid)+' 分区';
    svg+=`<rect x="${x1}" y="${y1}" width="${x2-x1}" height="${y2-y1}" rx="12"
          fill="${lighten(pc,0.05)}" stroke="${pc}" stroke-width="1.4" stroke-dasharray="7 5"/>`;
    const lw=[...lname].reduce((s,c)=>s+(c.charCodeAt(0)>255?12:7),0)+18;
    svg+=`<rect x="${x1+6}" y="${y1-15}" width="${lw}" height="14" rx="7" fill="${pc}"/>`;
    svg+=`<text x="${x1+6+lw/2}" y="${y1-4}" text-anchor="middle"
          style="font-size:9.5px;font-weight:700" fill="#fff">${lname}</text>`;
  });
  d.edges.forEach(([a,b])=>{
    const A=M[a],B=M[b]; const bc={x:B.x+B.w/2,y:B.y+B.h/2}, ac={x:A.x+A.w/2,y:A.y+A.h/2};
    const p1=borderPoint(A,bc.x,bc.y), p2=borderPoint(B,ac.x,ac.y);
    const key=a+'|'+b; const on=onEdges.get(key);
    const mx=(p1.x+p2.x)/2, my=(p1.y+p2.y)/2-18;
    if(on){
      svg+=`<path d="M${p1.x},${p1.y} Q${mx},${my} ${p2.x},${p2.y}" fill="none"
            stroke="${on}" stroke-width="4" marker-end="url(#ahx)"
            stroke-dasharray="7 5"><animate attributeName="stroke-dashoffset"
            from="24" to="0" dur="0.6s" repeatCount="indefinite"/></path>`;
      const tm=edgeTags.get(key);
      if(tm){
        const lbl=[...new Set([...tm.values()].flatMap(v=>[...v.ps]))].join(',');
        const lx=(p1.x+p2.x)/2, ly=(p1.y+p2.y)/2-19;
        const w=lbl.length*6.8+14;
        labelSvg+=`<rect x="${lx-w/2}" y="${ly-12}" width="${w}" height="17" rx="8"
              fill="#ffffff" stroke="${on}" stroke-width="1.3"/>`;
        labelSvg+=`<text x="${lx}" y="${ly}" text-anchor="middle"
              style="font-size:10.5px;font-weight:700" fill="${on}">${lbl}</text>`;
      }
    }else{
      svg+=`<path class="flowArrow" d="M${p1.x},${p1.y} Q${mx},${my} ${p2.x},${p2.y}"
            marker-end="url(#ah)"/>`;
    }
  });
  syncLinks.forEach(s=>{
    const A=M[s.from], B=M[s.to]; if(!A||!B) return;
    const p1=borderPoint(A,B.x+B.w/2,B.y+B.h/2), p2=borderPoint(B,A.x+A.w/2,A.y+A.h/2);
    const mx=(p1.x+p2.x)/2, my=(p1.y+p2.y)/2-14;
    const col=s.type==='ready'?COL.ready:COL.empty;
    svg+=`<path d="M${p1.x},${p1.y} Q${mx},${my} ${p2.x},${p2.y}" fill="none"
          stroke="${col}" stroke-width="2.2" stroke-dasharray="5 4" opacity="0.95"
          marker-end="url(#sync_${s.type})">
          <animate attributeName="stroke-dashoffset" from="18" to="0" dur="0.55s"
          repeatCount="indefinite"/></path>`;
  });
  const modProg=new Map();
  acts.forEach(o=>{ if(!o.flow||!(o.dur>0.05)||o.kind==='convert') return; const p=opProgress(o,t);
    o.flow.forEach(m=>{ const c=modProg.get(m); if(!c||p>c.p) modProg.set(m,{p,c:o.c}); }); });
  const modData=new Map();
  acts.forEach(o=>{ if(!o.flow||o.kind==='convert') return; const tg=dataTag(o); if(!tg) return;
    o.flow.forEach(m=>{ if(!modData.has(m)) modData.set(m,new Map());
      const mm=modData.get(m), k=tg.block+'¦'+tg.loc;
      if(!mm.has(k)) mm.set(k,{block:tg.block,loc:tg.loc,ps:new Set()});
      mm.get(k).ps.add(tg.p); }); });
  const modBuf=new Map();
  acts.forEach(o=>{ if(!o.flow) return; const tg=dataTag(o); if(!tg) return;
    o.flow.forEach((mid,fi)=>{ const mod=M[mid]; if(!mod||!mod.nbuf) return;
      const pre=mod.bufpre||'buf', idx=(pre==='acc'?o.acc:o.buf);
      if(idx===undefined) return;
      const loc=pre+idx, dir=(fi===o.flow.length-1)?'in':'out';
      if(!modBuf.has(mid)) modBuf.set(mid,new Map());
      const bm=modBuf.get(mid), cur=bm.get(loc), p=opProgress(o,t);
      if(!cur||p>cur.p) bm.set(loc,{p,c:o.c,dir,block:tg.block}); }); });
  d.modules.forEach(m=>{
    if(m.bar){
      const name=m.t[0], info=(barMap||{})[name]||{};
      const isEmpty=name.includes('empty');
      const st = isEmpty?emptyState(name,t):barrierActive(name,t), lit=st.green;
      const col=lit?COL.ready:'#94a3b8';
      const wm=M[info.watch];
      if(wm){
        const bc={x:m.x+m.w/2,y:m.y+m.h/2};
        const p1=borderPoint(wm,bc.x,bc.y), p2=borderPoint(m,wm.x+wm.w/2,wm.y+wm.h/2);
        svg+=`<path d="M${p1.x},${p1.y} L${p2.x},${p2.y}" fill="none"
              stroke="${lit?COL.ready:'#cbd5e1'}" stroke-width="${lit?2.2:1.2}"
              stroke-dasharray="3 3" opacity="${lit?0.95:0.55}"/>`;
      }
      svg+=`<rect class="nodeBox" x="${m.x}" y="${m.y}" width="${m.w}" height="${m.h}" rx="7"
            fill="${lit?'#dcfce7':'#eef2f7'}" stroke="${col}"
            stroke-width="${lit?2.6:1.3}" stroke-dasharray="4 3"/>`;
      svg+=`<circle cx="${m.x+12}" cy="${m.y+13}" r="4.5" fill="${col}"${lit?` stroke="#15803d" stroke-width="1"`:''}/>`;
      svg+=`<text x="${m.x+22}" y="${m.y+16}" text-anchor="start"
            style="font-size:10.5px;font-weight:700;font-family:Consolas,monospace"
            fill="${lit?'#15803d':'#64748b'}">${name}</text>`;
      if(info.cons) svg+=`<text x="${m.x+9}" y="${m.y+m.h-5}" text-anchor="start"
            style="font-size:8px;font-weight:600" fill="${lit?'#15803d':'#94a3b8'}">▷ ${pLane(info.cons)}${lit?' ✓':''}</text>`;
      const tag = isEmpty ? (st.locs||[]).join(',') : (st.block||'');
      if(tag) svg+=`<text x="${m.x+m.w-7}" y="${m.y+m.h-4}" text-anchor="end"
            style="font-size:9.5px;font-weight:800" fill="#0b6b3a">${tag}</text>`;
      return;
    }
    const on = onMods.has(m.id);
    const mc = m.c;
    const fill = on ? lighten(mc,0.16) : '#f8fafc';
    const stroke = on ? mc : '#b5c2d0';
    const sw = on ? 3 : 1.6;
    svg+=`<rect class="nodeBox" x="${m.x}" y="${m.y}" width="${m.w}" height="${m.h}"
          rx="9" fill="${fill}" stroke="${stroke}" stroke-width="${sw}"/>`;
    const cx=m.x+m.w/2;
    if(m.nbuf){
      svg+=`<text class="nodeLbl" x="${cx}" y="${m.y+15}" text-anchor="middle" fill="${on?mc:'#1c2733'}">${m.t[0]}</text>`;
      const pre=m.bufpre||'buf', bm=modBuf.get(m.id)||new Map();
      const pad=8, gap=6, sY=m.y+22, sH=m.h-28, sW=(m.w-2*pad-(m.nbuf-1)*gap)/m.nbuf;
      for(let b=0;b<m.nbuf;b++){

        svg+=`<text x="${sx+sW/2}" y="${sY+12}" text-anchor="middle"

        if(act){
          svg+=`<text x="${sx+sW/2}" y="${sY+25}" text-anchor="middle"
                style="font-size:10px;font-weight:700" fill="#1c2733">${info.block}</text>`;

                style="font-size:8px;font-weight:600" fill="${info.c}">${info.dir==='in'?'↘载入':'↗读出'} ${Math.round(info.p*100)}%</text>`;
          svg+=progBar(sx+5, sY+sH-7, sW-10, 4, info.dir==='in'?info.p:(1-info.p), info.c);
        }
      }
    }else{
      const isEngine = m.c===COL.tma;
      const actOp = m.showAct&&on ? acts.filter(o=>!o.mark&&o.flow&&o.flow.includes(m.id))
                                        .sort((a,b)=>b.start-a.start)[0] : null;
      const showData = !isEngine && !m.showAct && on && m.h>=60 && modData.has(m.id);
      let ty=m.y+ (m.t.length>2?20:24);
      m.t.forEach((line,i)=>{
        if((showData||isEngine||actOp) && i>0) return;
        const cls=i===0?'nodeLbl':'nodeSub';
        const fc=i===0?(on?mc:'#1c2733'):'#5b6b7d';
        svg+=`<text class="${cls}" x="${cx}" y="${ty}" text-anchor="middle" fill="${fc}">${line}</text>`;
        ty+= i===0?16:13;
      });
      if(showData){
        const label=[...new Set([...modData.get(m.id).values()].map(v=>v.block))].join(' · ');
        const bw=Math.min(m.w-12, label.length*6.4+14), by=ty-2;
        svg+=`<rect x="${cx-bw/2}" y="${by}" width="${bw}" height="15" rx="7.5"
              fill="#ffffff" stroke="${mc}" stroke-width="1.2"/>`;
        svg+=`<text x="${cx}" y="${by+11}" text-anchor="middle"
              style="font-size:9.5px;font-weight:700" fill="${mc}">${label}</text>`;
      }else if(actOp){
        const txt=opAction(actOp), bw=Math.min(m.w-12, txt.length*8+18), by=ty-2;
        svg+=`<rect x="${cx-bw/2}" y="${by}" width="${bw}" height="16" rx="8"
              fill="#ffffff" stroke="${actOp.c}" stroke-width="1.4"/>`;
        svg+=`<text x="${cx}" y="${by+11.5}" text-anchor="middle"
              style="font-size:10px;font-weight:700" fill="${actOp.c}">${txt}</text>`;
      }
      if(isEngine){
        svg+=`<text x="${cx}" y="${ty+2}" text-anchor="middle"
              style="font-size:11px;font-weight:700;font-family:Consolas,monospace"
              fill="${on?mc:'#94a3b8'}">${on?'working':'Idle'}</text>`;
      }else if(on && modProg.has(m.id)){
        const pr=modProg.get(m.id);
        svg+=progBar(m.x+10, m.y+m.h-11, m.w-20, 5, pr.p, pr.c);
      }
    }
  });
  svg+=labelSvg;
  svg+=`</svg>`;
  document.getElementById('microPanel').innerHTML=svg;
}

// 当前在某条数据流上的数据: {p:数据名, block:数据块, loc:所在缓冲}
function dataTag(op){
  if(op.kind==='loadC')      return {p:'C',   block:`t${op.tile}`,          loc:'c0'};
  if(op.kind==='load')       return {p:op.stream, block:`t${op.tile} k${op.k}`, loc:`buf${op.buf}`};
  if(op.kind==='copy')       return {p:'C',   block:`t${op.tile}`,          loc:`acc${op.acc}`};
  if(op.kind==='mma')        return {p:'A,B', block:`t${op.tile} k${op.k}`, loc:`acc${op.acc}`};
  if(op.kind==='tmem_load')  return {p:'acc', block:`t${op.tile}`,          loc:op.acc!==undefined?`acc${op.acc}`:''};
  if(op.kind==='convert')    return {p:'D',   block:`t${op.tile}`,          loc:''};
  if(op.kind==='store')      return {p:'D',   block:`t${op.tile}`,          loc:''};
  return null;
}
function opAction(op){
  if(!op) return '';
  const tg=dataTag(op)||{}, blk=tg.block?` ${tg.block}`:'';
  const v={loadC:'载入C',load:'载入A/B',copy:'拷贝C→acc',mma:'MMA',
    tmem_load:'读累加器',convert:'转布局',store:'写回D'}[op.kind]||'计算';
  return v+blk;
}

/* ============================================================================
   视角 1 — 数据切分 / 累加
   ========================================================================== */
function tileState(tl,t){
  let active=null;
  for(const o of S().ops){ if(o.tile!==tl||o.mark||!(o.dur>0.05)) continue;
    if(isActive(o,t)&&(!active||o.start>active.start)) active=o; }
  if(active) return {loadC:'loadingC',load:'loadingAB',copy:'copying',mma:'accumulating',
    tmem_load:'epilogue',convert:'epilogue',store:'epilogue'}[active.kind]||'future';
  if(S().ops.some(o=>o.tile===tl&&o.kind==='store'&&isDone(o,t))) return 'done';
  if(S().ops.some(o=>o.tile===tl&&!o.mark&&o.start<=t)) return 'idle';
  return 'future';
}
function renderData(t){
  const acts=activeOps(t);
  let curK=null;
  acts.forEach(o=>{ if(o.k!==undefined && (o.kind==='mma'||o.kind==='load')) curK=o.k; });
  const progOf=(pred)=>{ const o=acts.find(x=>!x.mark&&x.dur>0.05&&pred(x)); return o?{p:opProgress(o,t),c:o.c}:null; };

  const KX=[14,108,202], kw=80, kh=38;
  let svg=`<svg viewBox="0 0 300 415">`;
  svg+=`<text x="14" y="16" style="font-size:11px;font-weight:700" fill="#1c2733">D = A·B + C · 沿 K 累加</text>`;
  // A (M×K) 行带
  const ay=42;
  svg+=`<text class="gridLbl" x="14" y="${ay-6}">A (M×K) 行带</text>`;
  for(let k=0;k<S().K;k++){
    const on=curK===k, x=KX[k];
    svg+=`<rect class="cell" x="${x}" y="${ay}" width="${kw}" height="${kh}" rx="4"
          fill="${on?lighten(COL.A,.55):'#eef2f7'}" stroke="${on?COL.A:'#fff'}" stroke-width="${on?2:1.5}"/>`;
    svg+=`<text class="small" x="${x+kw/2}" y="${ay+kh+12}" text-anchor="middle">k${k}</text>`;
    if(on){ const pr=progOf(o=>o.k===k&&(o.kind==='mma'||(o.kind==='load'&&o.stream==='A')));

function renderCode(t, extra){
  const d=S(); const acts=activeOps(t);
  const lineActs=acts.concat(extra||[]);
  const onLines={}; const lineColor={};
  lineActs.forEach(o=>{ (o.lines||[]).forEach(ln=>{ onLines[ln]=true;
    if(!lineColor[ln]) lineColor[ln]=o.c; }); });
  const byLane={}; d.lanes.forEach(l=>byLane[l.id]=[]);
  acts.forEach(o=>byLane[o.part] && byLane[o.part].push(o));
  let html='';
  d.lanes.forEach(lane=>{
    const sw = pColor(lane.id);
    const os=byLane[lane.id];
    const now = os.length? os.map(o=>(o.mark?'• ':'')+o.label).join(' ｜ ') : '空闲 / 等待';
    const nowC= os.length? os[0].c : '#9aa7b4';
    html+=`<div class="cblock"><div class="cbhead">`+
          `<span class="sw" style="background:${sw}"></span>`+
          `<span class="cbname">${lane.name}</span>`+
          `<span class="cbpart">${lane.id}_partition</span>`+
          `<span class="cbnow" style="color:${nowC};border-color:${nowC}" title="${now.replace(/"/g,'')}">${now}</span>`+
          `</div><pre>`;
    d.code[lane.id].forEach(([id,txt,cls])=>{
      const on=onLines[id];
      const style=on?`background:${lighten(lineColor[id],.18)};border-left-color:${lineColor[id]}`:'';
      const esc=txt.replace(/</g,'&lt;');
      html+=`<div class="cl ${on?'on':''}" id="cl-${id}" style="${style}"><span class="${cls}">${esc}</span></div>`;
    });
    html+=`</pre></div>`;
  });
  document.getElementById('codePanel').innerHTML=html;
  const firstOn=(extra&&extra[0]&&extra[0].lines?extra[0]:null)
    || acts.find(o=>!o.mark&&o.lines) || acts.find(o=>o.lines);
  if(firstOn){ const el=document.getElementById('cl-'+firstOn.lines[0]);
    if(el) el.scrollIntoView({block:'nearest'}); }
  document.getElementById('explain').innerHTML=explainTick(t);
}

function pLane(id){const l=S().lanes.find(x=>x.id===id); return l?l.name.replace(' 分区',''):id;}
function pColor(id){return {load:COL.A,mma:COL.ACC,epilogue:COL.D}[id]||'#94a3b8';}
function codeRef(op){
  if(!op) return '';
  const code=S().code[op.part]||[];
  const rows=(op.lines||[]).map(id=>code.find(c=>c[0]===id)).filter(Boolean);
  if(!rows.length) return '';
  const want=op.fence?'fence':op.signal?(op.commit?'commit':'arrive'):(op.waitsOn!==undefined?'wait':null);
  const row=(want&&rows.find(r=>r[1].includes(want))) || (op.flow?rows[rows.length-1]:rows[0]);
  return row[1].trim().replace(/</g,'&lt;');
}
function consAction(act){
  if(!act) return '继续推进';
  const tg=dataTag(act);
  const v={loadC:'载入C',load:'载入A/B',copy:'拷贝C入累加器',mma:'MMA累加',
    tmem_load:'读累加器',convert:'转布局',store:'写回D'}[act.kind]||'处理';
  const where=tg?`${tg.block}${tg.loc?`(${tg.loc})`:''}`:'';
  return `开始${v} ${where}`.trim();
}
function explainTick(t){
  let te=t, dist=1e9;
  S().ops.forEach(o=>{ if(o.mark){const dd=Math.abs(o.start-t); if(dd<dist){dist=dd;te=o.start;}} });
  if(dist>0.7) return dataExplain(t);

  const eps=0.25, bm=S().barMap||{};
  const at=o=>o.mark && Math.abs(o.start-te)<eps;
  const waits  =S().ops.filter(o=>at(o)&&!o.signal&&!o.fence);
  const signals=S().ops.filter(o=>at(o)&&o.signal);
  const consumed=new Set();
  const rows=[];
  waits.forEach(w=>{
    const info=bm[(w.waitsOn||'').split('#')[0]];
    if(!info){ rows.push(rowPriming(w)); return; }
    const prod=findProducer(w); if(prod) consumed.add(prod);
    rows.push(rowBaton(prod,w,info));
  });
  signals.forEach(s=>{ if(!consumed.has(s)) rows.push(rowDeposit(s,bm)); });

  if(!rows.length) return dataExplain(t);
  const head=`<div class="exhead">⏱ t≈${Math.round(te)} · 此刻同时发生 <b>${rows.length}</b> 个同步事件</div>`;
  return `<div class="exrows">${head}${rows.join('')}</div>`;
}
function rowBaton(prod,w,info){
  const isR=(w.waitsOn||'').includes('ready'), col=isR?COL.ready:COL.empty;
  const bar=(w.waitsOn||'').split('#')[0];
  const fresh=prod && Math.abs((prod.start+prod.dur)-w.start)<0.3;
  const act=S().ops.find(o=>!o.mark&&o.flow&&o.part===w.part&&Math.abs(o.start-w.start)<0.3);
  const left=prod?`<span class="pp" style="background:${pColor(prod.part)}">${pLane(prod.part)}</span>`
                 :`<span class="pp" style="background:#94a3b8">?</span>`;
  return `<div class="exrow">${left}`+
    `<span class="arw" style="color:${col}">─ ${bar} ${isR?'🟢':'🔴'} ▶</span>`+
    `<span class="pp" style="background:${pColor(w.part)}">${pLane(w.part)}</span>`+
    `<span class="extxt">${info.txt}${fresh?'':'（早已就绪）'}，于是 ${pLane(w.part)} ${consAction(act)}</span></div>`+
    `<div class="extrig">📍 ${prod?`<b>${pLane(prod.part)}</b> <code>${codeRef(prod)}</code> 触发，`:''}`+
    `<b>${pLane(w.part)}</b> <code>${codeRef(w)}</code> 解除阻塞</div>`;
}
function rowPriming(w){
  const bar=(w.waitsOn||'').split('#')[0]||'(预热)';
  return `<div class="exrow"><span class="pp" style="background:${pColor(w.part)}">${pLane(w.part)}</span>`+
    `<span class="evt" style="color:#9aa7b5">▽ wait ${bar}</span>`+
    `<span class="extxt"><b>预热</b>：buffer 初始即空闲(mbarrier 初始相位=已完成)，wait 立即通过</span></div>`+
    `<div class="extrig">📍 <b>${pLane(w.part)}</b> <code>${codeRef(w)}</code></div>`;
}
function rowDeposit(s,bm){
  const bar=(s.signal||'').split('#')[0], info=bm[bar]||{}, isR=bar.includes('ready'), col=isR?COL.ready:COL.empty;
  const verb=s.commit?'⏫ commit':'▲ arrive';
  return `<div class="exrow"><span class="pp" style="background:${pColor(s.part)}">${pLane(s.part)}</span>`+
    `<span class="evt" style="color:${col}">${verb} ${bar} ${isR?'🟢':'🔴'}</span>`+
    `<span class="extxt">${s.commit?'tcgen05 <b>异步</b>提交：':''}宣告“${info.txt||''}”，`+
    `${isR?`放行 <b>${pLane(info.cons)}</b>`:`把 buffer 释放给 <b>${pLane(info.cons)}</b>`}（下一轮才会有人 wait 它）</span></div>`+
    `<div class="extrig">📍 <b>${pLane(s.part)}</b> <code>${codeRef(s)}</code></div>`;
}
function dataExplain(t){
  const datas=activeOps(t).filter(o=>!o.mark);
  if(datas.length){
    const parts=datas.map(o=>{const tg=dataTag(o);
      return tg?`<b>${pLane(o.part)}</b> 搬运 ${tg.p}→${tg.block}${tg.loc?`(${tg.loc})`:''}`:`<b>${pLane(o.part)}</b>`;});
    return `<div class="exsingle"><span class="exdot" style="background:${datas[0].c}"></span>`+
      `<span>各分区并行推进：${parts.join('；')}。无同步阻塞——warp specialization 把读/算/写重叠起来。</span></div>`;
  }
  return `<div class="exsingle"><span class="exdot" style="background:#9aa7b5"></span>`+
    `<span>流水线空隙：分区在等待下一个同步点。</span></div>`;
}

/* ============================================================================
   视角 3 — 时间线 Pipeline (含 mbarrier 同步箭头 + 可拖动播放头)
   ========================================================================== */
const TL={padL:166, padR:38, top:50, laneH:88};
const BAR_H=26;
function barY(part){     return laneY(part)+18; }
function dividerY(part){ return laneY(part)+50; }
function syncY(part){    return laneY(part)+68; }
function workRows(){
  const rowOf=new Map(); let maxRows=1; const byPart={};
  S().ops.forEach(o=>{ if(o.mark||!(o.dur>0)) return; (byPart[o.part]||(byPart[o.part]=[])).push(o); });
  Object.values(byPart).forEach(arr=>{
    arr.sort((a,b)=> a.start-b.start || a.dur-b.dur);
    const rowEnd=[];
    arr.forEach(o=>{
      let r=rowEnd.findIndex(e=> e<=o.start+1e-6);
      if(r<0){ r=rowEnd.length; rowEnd.push(0); }
      rowEnd[r]=o.start+o.dur; rowOf.set(o,r);
    });
    if(rowEnd.length>maxRows) maxRows=rowEnd.length;
  });
  return {rowOf,maxRows};
}
const BARCODE={load_ready:'Lr',load_empty:'Le',c_ready:'Cr',c_empty:'Ce',acc_ready:'Ar',acc_empty:'Ae'};
function syncOffsets(){
  const groups=new Map();
  S().ops.forEach(op=>{
    if(!op.mark || op.fence) return;
    const key=op.part+'@'+op.start.toFixed(3);
    if(!groups.has(key)) groups.set(key,[]);
    groups.get(key).push(op);
  });
  const off=new Map(); const SPREAD=15;
  groups.forEach(arr=>{
    const n=arr.length;
    arr.forEach((op,i)=> off.set(op,{dy:(i-(n-1)/2)*SPREAD, idx:i, n}));
  });
  return off;
}
function tlGeom(){
  const d=S(); const W=1000;
  const usable=W-TL.padL-TL.padR;
  const px=usable/d.maxTick;
  const H=TL.top + d.lanes.length*TL.laneH + 46;
  return {W,H,px,d};
}
function xOf(t){ const g=tlGeom(); return TL.padL + t*g.px; }
function laneY(part){ const d=S(); const i=d.lanes.findIndex(l=>l.id===part); return TL.top+i*TL.laneH; }

function renderTimeline(){
  const {W,H,px,d}=tlGeom();
  const soff=syncOffsets();
  const {rowOf,maxRows:wRows}=workRows();
  const ROWH = wRows>1 ? 16 : BAR_H;
  const BARH = wRows>1 ? 13 : BAR_H;
  const bandTop = p => laneY(p) + (wRows>1?14:18);
  const bandBot = p => bandTop(p) + wRows*ROWH;
  const rowY    = op => bandTop(op.part) + (rowOf.get(op)||0)*ROWH;
  const yTop=TL.top, yBot=TL.top+d.lanes.length*TL.laneH;
  const phx=xOf(tick), ti=Math.round(tick);

  svg+=`<defs>

  d.ops.forEach((op,oi)=>{

  });

  d.ops.forEach((op,oi)=>{
    if(!op.mark || op.fence) return;

  const card=`t ${tick.toFixed(1)}${(Math.abs(tick-ti)<0.3&&nsync)?`  ·  此刻 ${nsync} 个同步`:''}`;
  const cw=card.length*6.6+16, cxx=Math.min(Math.max(phx-cw/2,TL.padL-12),W-cw-6);
  svg+=`<rect x="${cxx}" y="${yBot+8}" width="${cw}" height="19" rx="9" fill="${COL.ACC}"/>`;
  svg+=`<text x="${cxx+cw/2}" y="${yBot+21}" text-anchor="middle" style="font-size:10.5px;font-weight:700" fill="#fff">${card}</text>`;

  svg+=`</svg>`;
  document.getElementById('tlbody').innerHTML=svg;
}
function barText(op){
  if(op.kind==='loadC')     return 'load C';
  if(op.kind==='load')      return `${op.stream}${op.buf!==undefined?'·b'+op.buf:''}`;
  if(op.kind==='copy')      return `copy C→a${op.acc}`;
  if(op.kind==='mma')       return `mma k${op.k}→a${op.acc}`;
  if(op.kind==='tmem_load') return `acc t${op.tile}`;
  if(op.kind==='convert')   return 'convert';
  if(op.kind==='store')     return 'store D';
  return op.stream||op.kind||'';
}

function bindTimeline(){
  const host=document.getElementById('tlbody');
  if(!host || host.dataset.bound) return;
  host.dataset.bound='1';
  const set=e=>{
    const svg=document.getElementById('tlsvg');
    if(!svg) return;
    const {px}=tlGeom();
    const ctm=svg.getScreenCTM(); if(!ctm) return;
    const pt=svg.createSVGPoint(); pt.x=e.clientX; pt.y=e.clientY;
    const vx=pt.matrixTransform(ctm.inverse()).x;
    let tt=(vx-TL.padL)/px;
    tt=Math.max(0,Math.min(S().maxTick,tt));
    setTick(tt);
  };
  let down=false;
  const setHover=e=>{
    const el=e.target.closest&&e.target.closest('[data-oi]');
    const nop=el?S().ops[+el.dataset.oi]:null;
    if(nop!==hoverOp){ hoverOp=nop||null; renderTimeline(); renderAll(); }
  };
  host.addEventListener('pointerdown',e=>{down=true;host.setPointerCapture(e.pointerId);stopPlay();set(e);e.preventDefault();});
  host.addEventListener('pointermove',e=>{ if(down){set(e);} else {setHover(e);} });
  host.addEventListener('pointerleave',()=>{ if(hoverOp){hoverOp=null;renderTimeline();renderAll();} });
  const up=e=>{down=false;try{host.releasePointerCapture(e.pointerId);}catch(_){}};
  host.addEventListener('pointerup',up);
  host.addEventListener('pointercancel',up);
}

/* ============================================================================
   渲染调度
   ========================================================================== */
function renderAll(){
  const extra=hoverOp?[hoverOp]:null;
  renderMicro(tick, extra);
  renderData(tick);
  renderCode(tick, extra);
  document.getElementById('tkval').textContent=tick.toFixed(1);
}
let _rqueued=false;
function setTick(t){
  tick=Math.max(0,Math.min(S().maxTick,t));
  if(_rqueued) return;
  _rqueued=true;
  requestAnimationFrame(()=>{ _rqueued=false; renderTimeline(); renderAll();
    document.getElementById('tkval').textContent=tick.toFixed(1); });
}

function arrowSwatch(color,dashed){
  return `<svg width="30" height="14" style="vertical-align:middle;margin-right:2px">`+
    `<path d="M3,11 Q14,1 23,7" fill="none" stroke="${color}" stroke-width="${dashed?2.2:3}"`+
    `${dashed?' stroke-dasharray="4 3"':''}/>`+
    `<path d="M23,3 L28,7.5 L20,10 Z" fill="${color}"/></svg>`;
}
function glyph(ch,color){
  return `<span style="color:${color};font-weight:700;font-size:13px;margin-right:2px">${ch}</span>`;
}
function markGlyphSvg(type,color){
  const w=18,h=14,cx=9,cy=7,r=5;
  const tri=(cy2,rr,fill,stroke)=>`<polygon points="${cx},${cy2-rr} ${cx-rr},${cy2+rr} ${cx+rr},${cy2+rr}" fill="${fill}" stroke="${stroke}" stroke-width="1"/>`;
  let inner='';
  if(type==='arrive')      inner=tri(cy,r,color,'#fff');
  else if(type==='commit') inner=`<polygon points="${cx},${cy-r} ${cx-4},${cy} ${cx+4},${cy}" fill="${color}"/>`+
                                 `<polygon points="${cx},${cy} ${cx-4},${cy+r} ${cx+4},${cy+r}" fill="${color}"/>`;
  else                     inner=`<polygon points="${cx-r},${cy-r} ${cx+r},${cy-r} ${cx},${cy+r}" fill="#fff" stroke="${color}" stroke-width="1.6"/>`;
  return `<svg width="${w}" height="${h}" style="vertical-align:middle;margin-right:2px">${inner}</svg>`;
}
function renderStageStatic(){
  const d=S();
  document.getElementById('stagedesc').innerHTML=d.desc;
  document.getElementById('tkmax').textContent=d.maxTick.toFixed(0);
  const colorItems=[
    ['A 输入',COL.A],['B 输入',COL.B],['C 累加值',COL.Cin],['MMA→acc',COL.ACC],['D 写回',COL.D],
  ];
  const grp=(label,arr,kv)=>`<b style="color:#5b6b7d;font-weight:700">${label}</b>`+
    arr.map(x=> kv
      ? `<span><i style="background:${x[1]}"></i>${x[0]}</span>`
      : `<span>${x[0]}${x[1]}</span>`).join('');
  const sep=`<span style="color:#cdd8e3">｜</span>`;
  const glyphItems=[
    [markGlyphSvg('arrive','#475569'),'arrive'],
    [markGlyphSvg('commit','#475569'),'commit 异步'],
    [markGlyphSvg('wait','#475569'),  'wait'],
  ];
  const arrowItems=[
    [arrowSwatch(COL.ready,true), 'ready 放行下游'],
    [arrowSwatch(COL.empty,true), 'empty 放行上游'],
  ];
  document.getElementById('legend').innerHTML=
    grp('工作条 ',colorItems,true)+
    sep+
    grp('标记 ',glyphItems,false)+
    sep+
    grp('握手 ',arrowItems,false)+
    sep+
    `<span style="color:#5b6b7d">同刻并发=上下堆叠+短码(Lr/Le·Cr/Ce·Ar/Ae)</span>`+
    sep+
    `<span style="color:#0b6b3a">拖动/悬停↔联动 视角1·2·4</span>`;
}

/* ============================================================================
   播放控制
   ========================================================================== */
function play(){
  if(playing) return; playing=true;
  document.getElementById('playBtn').textContent='⏸ 暂停';
  let last=null;
  const loop=ts=>{
    if(!playing) return;
    if(last==null) last=ts;
    const dt=(ts-last)/1000; last=ts;
    let nt=tick+dt*2.2;
    if(nt>=S().maxTick){ nt=S().maxTick; setTick(nt); stopPlay(); return; }
    setTick(nt); raf=requestAnimationFrame(loop);
  };
  raf=requestAnimationFrame(loop);
}
function stopPlay(){ playing=false; if(raf)cancelAnimationFrame(raf); raf=null;
  document.getElementById('playBtn').textContent='▶ 播放'; }

document.getElementById('playBtn').onclick=()=>{ playing?stopPlay():(tick>=S().maxTick&&setTick(0),play()); };
document.getElementById('stepF').onclick=()=>{stopPlay();setTick(Math.min(S().maxTick,Math.floor(tick+1)));};
document.getElementById('stepB').onclick=()=>{stopPlay();setTick(Math.max(0,Math.ceil(tick-1)));};
document.getElementById('resetB').onclick=()=>{stopPlay();setTick(0);};

/* init */
renderStageStatic();
renderTimeline();
bindTimeline();
renderAll();
window.addEventListener('resize',()=>renderTimeline());
</script>
